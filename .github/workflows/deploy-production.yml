# Deploy backend (Railway) + frontend (Netlify) on every push to main.
#
# Required GitHub repo secrets — see .github/DEPLOY_SETUP.txt
#
# Railway: soothing-creativity deploys backend/ via Railway GitHub integration (root: backend).
# This workflow deploys Netlify only. To deploy Railway from Actions too, add RAILWAY_TOKEN +
# RAILWAY_SERVICE_ID secrets and restore the deploy-railway job (see DEPLOY_SETUP.txt).

name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy-netlify:
    name: Netlify (UI)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install & build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: ./frontend/dist
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Production deploy ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 10
